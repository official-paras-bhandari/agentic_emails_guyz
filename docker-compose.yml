services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: agentic_outreach
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports: ["5433:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d agentic_outreach"]
      interval: 2s
      timeout: 3s
      retries: 20
    volumes: ["agentic-postgres:/var/lib/postgresql/data"]
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 20

volumes:
  agentic-postgres:
